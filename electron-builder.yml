appId: com.appmusic.downloader
productName: AppMusic
copyright: Copyright © 2024

directories:
  output: dist
  buildResources: assets

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: assets/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: AppMusic

# Bundle ffmpeg binary alongside the app
extraResources:
  - from: "node_modules/ffmpeg-static/ffmpeg.exe"
    to: "bin/ffmpeg.exe"

files:
  - main.js
  - preload.js
  - renderer/**/*
  - assets/**/*
  - node_modules/ffmpeg-static/**/*

asar: true
compression: maximum
